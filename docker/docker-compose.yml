# ============================================================
# Fury SMS Gateway - Docker Compose
# ============================================================
# Profiles:
#   - dev:     Run API server locally with PostgreSQL + Redis
#   - prod:    Full production stack (WIP)
# ============================================================

x-env: &env
  APP_ENV: ${APP_ENV:-development}
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: ${DB_USER:-fury}
  DB_PASSWORD: ${DB_PASSWORD:-fury}
  DB_NAME: ${DB_NAME:-fury_sms}
  DB_SSLMODE: disable
  REDIS_HOST: redis
  REDIS_PORT: 6379
  JWT_SECRET: ${JWT_SECRET:-change-this-in-production-very-long-secret}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ==========================================================
  # API Server
  # ==========================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      <<: *env
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    profiles:
      - dev
      - prod

  # ==========================================================
  # Bootstrap (one-time setup)
  # ==========================================================
  bootstrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["/app/fury-bootstrap"]
    command:
      - --admin-email=${BOOTSTRAP_ADMIN_EMAIL:-admin@fury-sms.com}
      - --admin-password=${BOOTSTRAP_ADMIN_PASSWORD:-changeme1234!}
      - --admin-name=${BOOTSTRAP_ADMIN_NAME:-Super Admin}
    environment:
      <<: *env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev
      - prod

  # ==========================================================
  # PostgreSQL
  # ==========================================================
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-fury}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fury}
      POSTGRES_DB: ${DB_NAME:-fury_sms}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fury} -d ${DB_NAME:-fury_sms}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    profiles:
      - dev
      - prod

  # ==========================================================
  # Redis
  # ==========================================================
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    profiles:
      - dev
      - prod

volumes:
  postgres_data:
    name: fury_sms_postgres_data
